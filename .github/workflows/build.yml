name: Build AccSaberQuest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: QPM restore
        run: |
          export PATH="/usr/local/bin:$PATH"
          qpm restore
          echo "=== extern folder ==="
          find extern -type f 2>/dev/null | head -30 || echo "no extern folder"
          qpm s cmake 2>/dev/null || true
          echo "=== after qpm s cmake ==="
          find extern -name "*.cmake" 2>/dev/null | head -20

      - name: Debug extern folder
        run: |
          echo "=== extern folder contents ==="
          find extern -type f | head -50 || echo "extern folder empty or missing"
          echo "=== looking for cmake files ==="
          find . -name "*.cmake" | head -20

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: QPM restore
        run: qpm restore

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure CMake
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-32 \
            -DANDROID_STL=c++_static

      - name: Build
        run: cmake --build build --config Release

      - name: Locate QMOD
        id: locate
        run: |
          QMOD=$(find build -name "*.qmod" | head -1)
          echo "qmod_path=$QMOD" >> $GITHUB_OUTPUT
          echo "Found qmod: $QMOD"

      - name: Upload QMOD artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccSaberQuest
          path: ${{ steps.locate.outputs.qmod_path }}
          if-no-files-found: error
