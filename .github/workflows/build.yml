name: Build AccSaberQuest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Install QPM
        run: |
          curl -SLo /tmp/qpm.zip "https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip"
          unzip /tmp/qpm.zip -d /tmp/qpm_extracted
          QPM_BIN=$(find /tmp/qpm_extracted -type f | head -1)
          echo "Found QPM binary: $QPM_BIN"
          cp "$QPM_BIN" /tmp/qpm
          chmod +x /tmp/qpm
          /tmp/qpm --version

      - name: QPM restore
        run: |
          /tmp/qpm restore || true
          echo "=== Manually copying from QPM cache to extern ==="
          mkdir -p extern/includes extern/libs
          QPM_CACHE=~/.local/share/QPM-RS/cache
          # Copy all headers
          find $QPM_CACHE -path "*/shared/*" -name "*.hpp" | while read f; do
            pkg=$(echo $f | cut -d'/' -f9)
            mkdir -p extern/includes/$pkg
            cp "$f" extern/includes/$pkg/ 2>/dev/null || true
          done
          # Copy all .so files
          find $QPM_CACHE -name "lib*.so" ! -name "*.debug.so" -exec cp {} extern/libs/ \; 2>/dev/null || true
          # Generate extern.cmake
          cat > extern/extern.cmake << 'EOF'
          set(EXTERN_DIR ${CMAKE_CURRENT_LIST_DIR}/extern)
          include_directories(${EXTERN_DIR}/includes)
          link_directories(${EXTERN_DIR}/libs)
          EOF
          echo "=== extern contents ==="
          find extern -type f | head -30


      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Show CMakeLists
        run: cat CMakeLists.txt

      - name: Configure CMake
        run: |
          rm -rf build
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-32 \
            -DANDROID_STL=c++_static

      - name: Build
        run: cmake --build build --config Release

      - name: Locate QMOD
        id: locate
        run: |
          QMOD=$(find build -name "*.qmod" | head -1)
          echo "qmod_path=$QMOD" >> $GITHUB_OUTPUT

      - name: Upload QMOD artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccSaberQuest
          path: ${{ steps.locate.outputs.qmod_path }}
          if-no-files-found: error
