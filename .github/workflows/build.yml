name: Build AccSaberQuest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PATH: /usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Install QPM
        run: |
          curl -SLo /tmp/qpm.zip "https://github.com/QuestPackageManager/QPM.CLI/releases/download/v1.5.9/qpm-linux-x64.zip"
          unzip /tmp/qpm.zip -d /tmp/qpm_extracted
          QPM_BIN=$(find /tmp/qpm_extracted -type f -name "qpm*" | head -1)
          cp "$QPM_BIN" /usr/local/bin/qpm
          chmod +x /usr/local/bin/qpm
          echo "/usr/local/bin" >> $GITHUB_PATH
          qpm --version

      - name: Debug extern folder
        run: |
          echo "=== extern folder contents ==="
          find extern -type f | head -50 || echo "extern folder empty or missing"
          echo "=== looking for cmake files ==="
          find . -name "*.cmake" | head -20

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: QPM restore
        run: qpm restore

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure CMake
        run: |
          export PATH="/usr/local/bin:$PATH"
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-32 \
            -DANDROID_STL=c++_static

      - name: Build
        run: cmake --build build --config Release

      - name: Locate QMOD
        id: locate
        run: |
          QMOD=$(find build -name "*.qmod" | head -1)
          echo "qmod_path=$QMOD" >> $GITHUB_OUTPUT
          echo "Found qmod: $QMOD"

      - name: Upload QMOD artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccSaberQuest
          path: ${{ steps.locate.outputs.qmod_path }}
          if-no-files-found: error
