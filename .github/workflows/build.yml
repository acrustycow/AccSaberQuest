name: Build AccSaberQuest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Install QPM
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os
          url = "https://api.github.com/repos/QuestPackageManager/QPM.CLI/releases/tags/v1.5.9"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req) as r:
              data = json.load(r)
          assets = data["assets"]
          for a in assets:
              name = a["name"].lower()
              if "linux" in name and "musl" not in name:
                  print(a["browser_download_url"])
                  with open("/tmp/qpm_url.txt", "w") as f:
                      f.write(a["browser_download_url"])
          EOF
          QPM_URL=$(cat /tmp/qpm_url.txt)
          echo "Downloading QPM from: $QPM_URL"
          curl -SLo /usr/local/bin/qpm "$QPM_URL"
          chmod +x /usr/local/bin/qpm
          qpm --version

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: QPM restore
        run: qpm restore

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-32 \
            -DANDROID_STL=c++_static

      - name: Build
        run: cmake --build build --config Release

      - name: Locate QMOD
        id: locate
        run: |
          QMOD=$(find build -name "*.qmod" | head -1)
          echo "qmod_path=$QMOD" >> $GITHUB_OUTPUT
          echo "Found qmod: $QMOD"

      - name: Upload QMOD artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccSaberQuest
          path: ${{ steps.locate.outputs.qmod_path }}
          if-no-files-found: error
